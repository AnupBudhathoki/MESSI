{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/first.css' %}">
</head>

<body>
    <div id="setup">
        <div id="wire">
        </div>
        <div id="bulb">
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-4">
                <img src="{% static 'core/images/L.jpeg' %}" alt="">
            </div>
            <div class="col-4">
                <img src="{% static 'core/images/5.jpeg' %}" alt="">
            </div>
            <div class="col-4">
                <img src="{% static 'core/images/4.jpeg' %}" alt="">
            </div>
        </div>
        <div class="row">
            <div class="col-4">
                <img src="{% static 'core/images/1.jpeg' %}" alt="">
            </div>
            <div class="col-4">
                <img src="{% static 'core/images/2.jpeg' %}" alt="">
            </div>
            <div class="col-4">
                <img src="{% static 'core/images/3.jpeg' %}" alt="">
            </div>
        </div>
    </div>
    <div class="container2">
        <div class="curtain"></div>
        <div class="curtain2"></div>
    </div>

    <div class="btn" id="btn">
        <!-- From Uiverse.io by LilaRest -->
        <button onclick="openCurtain()" class="button">
            <svg class="empty" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
                <path fill="none" d="M0 0H24V24H0z"></path>
                <path
                    d="M16.5 3C19.538 3 22 5.5 22 9c0 7-7.5 11-10 12.5C9.5 20 2 16 2 9c0-3.5 2.5-6 5.5-6C9.36 3 11 4 12 5c1-1 2.64-2 4.5-2zm-3.566 15.604c.881-.556 1.676-1.109 2.42-1.701C18.335 14.533 20 11.943 20 9c0-2.36-1.537-4-3.5-4-1.076 0-2.24.57-3.086 1.414L12 7.828l-1.414-1.414C9.74 5.57 8.576 5 7.5 5 5.56 5 4 6.656 4 9c0 2.944 1.666 5.533 4.645 7.903.745.592 1.54 1.145 2.421 1.7.299.189.595.37.934.572.339-.202.635-.383.934-.571z">
                </path>
            </svg>
            <svg class="filled" height="32" width="32" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 0H24V24H0z" fill="none"></path>
                <path
                    d="M16.5 3C19.538 3 22 5.5 22 9c0 7-7.5 11-10 12.5C9.5 20 2 16 2 9c0-3.5 2.5-6 5.5-6C9.36 3 11 4 12 5c1-1 2.64-2 4.5-2z">
                </path>
            </svg>
            Open the Curtain
        </button>

    </div>

    <div class="tt" id="message">
        <h3 style="font-size: 100px;">Happy <span style="color: rgb(144, 190, 230);">39<sup>th</sup></span>Birthday Leo!
        </h3>
    </div>

    <div id="btn2">
        <a class="button2" href="{% url 'home' %}">
            Let's go for Aarati
        </a>
    </div>

    <script src="{% static 'core/js/first.js' %}"></script>
</body>

</html>
